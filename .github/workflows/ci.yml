name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Build index for customer_bp_model example
        run: modelops build-index --repo examples/customer_bp_model --jsonl

      - name: Build index for supplier_vendor_model example
        run: modelops build-index --repo examples/supplier_vendor_model --jsonl

      - name: Test
        run: python -m pytest

      - name: Validate customer_bp_model example
        run: modelops validate --repo examples/customer_bp_model

      - name: Validate supplier_vendor_model example
        run: modelops validate --repo examples/supplier_vendor_model
