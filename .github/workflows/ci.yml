name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,google_adk,mcp]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Build index for customer_bp_model example
        run: modelops build-index --repo examples/customer_bp_model --jsonl

      - name: Build index for supplier_vendor_model example
        run: modelops build-index --repo examples/supplier_vendor_model --jsonl

      - name: Build index for simple_product_model example
        run: modelops build-index --repo examples/simple_product_model --jsonl

      - name: Build index for generic_product_model example
        run: modelops build-index --repo examples/generic_product_model --jsonl

      - name: Test with coverage
        run: python -m pytest --cov=modelops_core --cov-report=term-missing --cov-fail-under=70

      - name: Validate customer_bp_model example
        run: modelops validate --repo examples/customer_bp_model

      - name: Validate supplier_vendor_model example
        run: modelops validate --repo examples/supplier_vendor_model

      - name: Validate simple_product_model example
        run: modelops validate --repo examples/simple_product_model

      - name: Validate generic_product_model example
        run: modelops validate --repo examples/generic_product_model

      - name: Release smoke checks
        run: bash scripts/release_smoke.sh

      - name: Docs command-snippet freshness
        run: python scripts/validate_doc_commands.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm test

      - name: Lint frontend (if configured)
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script configured; skipping"
          fi
